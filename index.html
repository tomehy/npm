<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة إدارة الفلل</title>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase - أهم شيء -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4"></script>
  
  <style>
    * { direction: rtl; margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://ckggajkwgfqoddyhypjp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iZ9WrOLC5gMfrXZpL7JV-A_Vy1ve5LQ';

    function App() {
      const [darkMode, setDarkMode] = useState(localStorage.getItem('darkMode') === 'true');
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [projects, setProjects] = useState([]);
      const [selectedProject, setSelectedProject] = useState(null);
      const [phases, setPhases] = useState([]);
      const [expandedPhases, setExpandedPhases] = useState(new Set());
      const [expandedPackages, setExpandedPackages] = useState(new Set());
      const [budget, setBudget] = useState({ estimated: 0, revised: 0, actual: 0 });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedItem, setSelectedItem] = useState(null);
      const [supabase, setSupabase] = useState(null);

      useEffect(() => {
        initSupabase();
      }, []);

      const initSupabase = async () => {
        try {
          console.log('🔍 التحقق من window.supabase:', window.supabase);
          
          if (!window.supabase) {
            throw new Error('مكتبة Supabase لم تُحمّل بعد');
          }

          const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          setSupabase(client);
          console.log('✅ تم تهيئة Supabase بنجاح');
          
          await loadProjects(client);
        } catch (e) {
          console.error('❌ خطأ في التهيئة:', e);
          setError('❌ ' + e.message);
          setLoading(false);
        }
      };

      const loadProjects = async (client) => {
        try {
          setLoading(true);
          console.log('📡 جاري تحميل المشاريع...');
          
          const { data, error: err } = await client
            .from('projects')
            .select('*')
            .limit(100);
          
          console.log('✅ النتيجة:', { data, error: err });
          
          if (err) {
            throw new Error(err.message);
          }

          if (data && data.length > 0) {
            setProjects(data);
            setSelectedProject(data[0].id);
            setError(null);
          } else {
            setError('لا توجد مشاريع');
          }
        } catch (e) {
          console.error('❌ خطأ:', e);
          setError('❌ ' + e.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        if (selectedProject && supabase) {
          loadProjectData(supabase, selectedProject);
        }
      }, [selectedProject, supabase]);

      const loadProjectData = async (client, projectId) => {
        try {
          console.log('📡 جاري تحميل المرحلة:', projectId);
          
          const { data, error: err } = await client
            .from('project_phases')
            .select(`
              id, phase_code, phase_name, phase_order, status,
              project_packages (
                id, package_code, package_name, status, 
                budget_estimated, budget_revised, budget_actual,
                finishing_items (
                  id, item_name, item_code, category, quantity, unit_of_measure,
                  proposed_brand, quality_grade, size_dimensions,
                  total_price_estimated, total_price_revised, total_price_actual, 
                  status, notes
                )
              )
            `)
            .eq('project_id', projectId)
            .order('phase_order', { ascending: true });

          console.log('✅ النتيجة:', { data, error: err });

          if (err) {
            throw new Error(err.message);
          }

          setPhases(data || []);
          
          let totalEst = 0, totalRev = 0, totalAct = 0;
          data?.forEach(phase => {
            phase.project_packages?.forEach(pkg => {
              totalEst += pkg.budget_estimated || 0;
              totalRev += pkg.budget_revised || pkg.budget_estimated || 0;
              totalAct += pkg.budget_actual || 0;
            });
          });
          setBudget({ estimated: totalEst, revised: totalRev, actual: totalAct });
        } catch (e) {
          console.error('❌ خطأ:', e);
          setError('❌ ' + e.message);
        }
      };

      const togglePhase = (id) => {
        const newSet = new Set(expandedPhases);
        newSet.has(id) ? newSet.delete(id) : newSet.add(id);
        setExpandedPhases(newSet);
      };

      const togglePackage = (id) => {
        const newSet = new Set(expandedPackages);
        newSet.has(id) ? newSet.delete(id) : newSet.add(id);
        setExpandedPackages(newSet);
      };

      const variance = budget.revised > 0 
        ? ((budget.revised - budget.estimated) / budget.estimated * 100).toFixed(1) 
        : 0;

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-900">
            <div className="text-center">
              <div className="text-5xl mb-4 animate-spin">⚙️</div>
              <p className="text-slate-600 dark:text-slate-400">جاري التحميل...</p>
            </div>
          </div>
        );
      }

      return (
        <div className={darkMode ? 'dark' : ''}>
          <div className="min-h-screen bg-slate-50 dark:bg-slate-900">
            {/* Header */}
            <header className="bg-white dark:bg-slate-800 border-b border-slate-200 sticky top-0 z-40 p-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setSidebarOpen(!sidebarOpen)}
                    className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-lg"
                  >
                    ☰
                  </button>
                  <h1 className="text-xl font-bold">🏢 منصة الفلل</h1>
                </div>
                <button
                  onClick={() => setDarkMode(!darkMode)}
                  className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-xl"
                >
                  {darkMode ? '☀️' : '🌙'}
                </button>
              </div>
            </header>

            {/* Main Content */}
            <div className="flex">
              {/* Sidebar */}
              {sidebarOpen && (
                <aside className="w-80 bg-white dark:bg-slate-800 border-r border-slate-200 p-4 max-h-[calc(100vh-70px)] overflow-y-auto">
                  <h2 className="text-lg font-bold mb-4">📋 المشاريع</h2>
                  
                  {error && (
                    <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 p-3 rounded mb-4 text-sm text-red-600">
                      {error}
                    </div>
                  )}
                  
                  <div className="space-y-2">
                    {projects.length > 0 ? (
                      projects.map(project => (
                        <button
                          key={project.id}
                          onClick={() => setSelectedProject(project.id)}
                          className={`w-full text-left p-3 rounded border transition ${
                            selectedProject === project.id
                              ? 'bg-blue-100 dark:bg-blue-900/40 border-blue-400'
                              : 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 hover:bg-blue-100'
                          }`}
                        >
                          <p className="font-bold text-sm">{project.name}</p>
                          <p className="text-xs text-slate-600">{project.location}</p>
                        </button>
                      ))
                    ) : (
                      <p className="text-slate-600 text-sm">لا توجد مشاريع</p>
                    )}
                  </div>
                </aside>
              )}

              {/* Main */}
              <main className="flex-1 p-4 max-h-[calc(100vh-70px)] overflow-y-auto">
                {selectedProject && phases.length > 0 ? (
                  <div className="space-y-4 max-w-5xl">
                    {/* Tree */}
                    <div className="bg-white dark:bg-slate-800 rounded-lg shadow p-5">
                      <h2 className="font-bold mb-4 text-lg">📊 هيكل المشروع</h2>
                      <div className="space-y-2">
                        {phases.map(phase => (
                          <div key={phase.id} className="border border-slate-200 rounded">
                            <button
                              onClick={() => togglePhase(phase.id)}
                              className="w-full flex items-center justify-between p-3 hover:bg-slate-50 text-sm font-medium"
                            >
                              <span>{expandedPhases.has(phase.id) ? '▼' : '▶'} {phase.phase_name}</span>
                              <span className="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded">
                                {phase.project_packages?.length || 0}
                              </span>
                            </button>

                            {expandedPhases.has(phase.id) && (
                              <div className="border-t border-slate-200 bg-slate-50">
                                {phase.project_packages?.map(pkg => (
                                  <div key={pkg.id}>
                                    <button
                                      onClick={() => togglePackage(pkg.id)}
                                      className="w-full flex items-center justify-between p-3 hover:bg-slate-100 text-sm border-b border-slate-200 ml-4"
                                    >
                                      <span>{expandedPackages.has(pkg.id) ? '▼' : '▶'} {pkg.package_name}</span>
                                      <span className="text-blue-600 font-bold text-xs">{pkg.budget_estimated || 0} ر.س</span>
                                    </button>

                                    {expandedPackages.has(pkg.id) && (
                                      <div className="bg-white border-t border-slate-200">
                                        {pkg.finishing_items?.map(item => (
                                          <button
                                            key={item.id}
                                            onClick={() => setSelectedItem(item)}
                                            className="w-full text-left p-3 border-b border-slate-200 hover:bg-blue-50 text-xs ml-8"
                                          >
                                            <p className="font-bold">{item.item_name}</p>
                                            <p className="text-slate-600">الكمية: {item.quantity} {item.unit_of_measure}</p>
                                            <p className="text-slate-600">الماركة: {item.proposed_brand || 'قيد التحديد'}</p>
                                            <p className="text-blue-600 font-bold mt-1">{item.total_price_estimated || 0} ريال</p>
                                          </button>
                                        ))}
                                      </div>
                                    )}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Budget */}
                    <div className="bg-white dark:bg-slate-800 rounded-lg shadow p-5">
                      <h2 className="font-bold mb-4 text-lg">💰 الميزانية</h2>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div className="bg-blue-50 p-4 rounded border border-blue-200">
                          <p className="text-blue-600 text-xs font-bold mb-1">المقدرة</p>
                          <p className="font-bold text-blue-900 text-lg">{budget.estimated.toLocaleString()} ريال</p>
                        </div>
                        <div className="bg-yellow-50 p-4 rounded border border-yellow-200">
                          <p className="text-yellow-600 text-xs font-bold mb-1">المعدلة</p>
                          <p className="font-bold text-yellow-900 text-lg">{budget.revised.toLocaleString()} ريال</p>
                          <p className="text-xs mt-1 font-bold" style={{ color: variance < 0 ? '#16a34a' : '#dc2626' }}>
                            {variance < 0 ? '📉' : '📈'} {variance}%
                          </p>
                        </div>
                        <div className="bg-green-50 p-4 rounded border border-green-200">
                          <p className="text-green-600 text-xs font-bold mb-1">المنصرف</p>
                          <p className="font-bold text-green-900 text-lg">{budget.actual.toLocaleString()} ريال</p>
                        </div>
                      </div>
                    </div>

                    {/* Details */}
                    {selectedItem && (
                      <div className="bg-white dark:bg-slate-800 rounded-lg shadow p-5">
                        <h2 className="font-bold mb-4 text-lg">📝 تفاصيل العنصر</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                          <div><p className="text-slate-600 text-xs font-bold">الاسم</p><p className="font-bold">{selectedItem.item_name}</p></div>
                          <div><p className="text-slate-600 text-xs font-bold">الكمية</p><p className="font-bold">{selectedItem.quantity} {selectedItem.unit_of_measure}</p></div>
                          <div><p className="text-slate-600 text-xs font-bold">الماركة</p><p className="font-bold">{selectedItem.proposed_brand || 'قيد التحديد'}</p></div>
                          <div><p className="text-slate-600 text-xs font-bold">الجودة</p><p className="font-bold">{selectedItem.quality_grade || 'عادية'}</p></div>
                          <div><p className="text-slate-600 text-xs font-bold">السعر المقدر</p><p className="font-bold text-blue-600">{selectedItem.total_price_estimated?.toLocaleString() || 0} ريال</p></div>
                          <div><p className="text-slate-600 text-xs font-bold">الأبعاد</p><p className="font-bold">{selectedItem.size_dimensions || 'قياسية'}</p></div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center h-96">
                    <div className="text-5xl mb-4">📊</div>
                    <p className="text-slate-600">{error || 'لا توجد بيانات'}</p>
                  </div>
                )}
              </main>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
