<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة إدارة الفلل</title>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { direction: rtl; margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = 'https://ckggajkwgfqoddyhypjp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iZ9WrOLC5gMfrXZpL7JV-A_Vy1ve5LQ';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Icons (بسيطة بدون مكتبة)
    const ChevronDown = () => <span>▼</span>;
    const ChevronUp = () => <span>▲</span>;
    const Menu = () => <span>☰</span>;
    const Moon = () => <span>🌙</span>;
    const Sun = () => <span>☀️</span>;
    const Building2 = () => <span>🏢</span>;
    const BarChart3 = () => <span>📊</span>;
    const Package = () => <span>📦</span>;

    function ProjectTree({ projectId, onBudgetUpdate, onItemSelect }) {
      const [phases, setPhases] = useState([]);
      const [expandedPhases, setExpandedPhases] = useState(new Set());
      const [expandedPackages, setExpandedPackages] = useState(new Set());
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadProjectData();
      }, [projectId]);

      const loadProjectData = async () => {
        try {
          setLoading(true);

          const { data: phasesData } = await supabase
            .from('project_phases')
            .select('*')
            .eq('project_id', projectId)
            .order('phase_number', { ascending: true });

          const phasesWithData = await Promise.all(
            (phasesData || []).map(async (phase) => {
              const { data: packages } = await supabase
                .from('project_packages')
                .select('*')
                .eq('phase_id', phase.id);

              const packagesWithData = await Promise.all(
                (packages || []).map(async (pkg) => {
                  const { data: subcategories } = await supabase
                    .from('package_subcategories')
                    .select('*')
                    .eq('package_id', pkg.id);

                  const subcategoriesWithItems = await Promise.all(
                    (subcategories || []).map(async (sub) => {
                      const { data: items } = await supabase
                        .from('project_items')
                        .select('*')
                        .eq('subcategory_id', sub.id);

                      return { ...sub, items: items || [] };
                    })
                  );

                  return { ...pkg, subcategories: subcategoriesWithItems };
                })
              );

              return { ...phase, packages: packagesWithData };
            })
          );

          setPhases(phasesWithData);
          onBudgetUpdate(phasesWithData);
        } catch (error) {
          console.error('خطأ:', error);
        } finally {
          setLoading(false);
        }
      };

      const togglePhase = (id) => {
        const newSet = new Set(expandedPhases);
        newSet.has(id) ? newSet.delete(id) : newSet.add(id);
        setExpandedPhases(newSet);
      };

      const togglePackage = (id) => {
        const newSet = new Set(expandedPackages);
        newSet.has(id) ? newSet.delete(id) : newSet.add(id);
        setExpandedPackages(newSet);
      };

      if (loading) {
        return (
          <div className="bg-white dark:bg-slate-800 rounded-lg shadow-lg p-6">
            <div className="animate-pulse space-y-3">
              <div className="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/4"></div>
              <div className="h-12 bg-slate-200 dark:bg-slate-700 rounded"></div>
              <div className="h-12 bg-slate-200 dark:bg-slate-700 rounded"></div>
            </div>
          </div>
        );
      }

      return (
        <div className="bg-white dark:bg-slate-800 rounded-lg shadow-lg p-5">
          <h2 className="text-xl font-bold text-slate-900 dark:text-white mb-4">📊 هيكل المشروع</h2>
          <div className="space-y-2">
            {phases.map(phase => (
              <div key={phase.id} className="border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden">
                {/* Phase */}
                <button
                  onClick={() => togglePhase(phase.id)}
                  className="w-full flex items-center justify-between p-3 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-medium text-slate-900 dark:text-white"
                >
                  <span className="flex items-center gap-2">
                    {expandedPhases.has(phase.id) ? <ChevronUp /> : <ChevronDown />}
                    <Package />
                    {phase.name_ar}
                  </span>
                  <span className="bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 text-xs px-2 py-1 rounded">
                    {phase.packages?.length || 0}
                  </span>
                </button>

                {/* Packages */}
                {expandedPhases.has(phase.id) && (
                  <div className="border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-700/30">
                    {phase.packages?.map(pkg => (
                      <div key={pkg.id}>
                        <button
                          onClick={() => togglePackage(pkg.id)}
                          className="w-full flex items-center justify-between p-3 hover:bg-slate-100 dark:hover:bg-slate-700 text-sm border-b border-slate-200 dark:border-slate-700 ml-4 text-slate-900 dark:text-white"
                        >
                          <span className="flex items-center gap-2">
                            {expandedPackages.has(pkg.id) ? <ChevronUp /> : <ChevronDown />}
                            {pkg.name_ar}
                          </span>
                          <span className="text-xs text-slate-600 dark:text-slate-300">{pkg.subcategories?.length || 0}</span>
                        </button>

                        {/* Subcategories */}
                        {expandedPackages.has(pkg.id) && (
                          <div className="border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                            {pkg.subcategories?.map(sub => (
                              <div key={sub.id}>
                                <div className="p-3 ml-8 bg-blue-50 dark:bg-blue-900/20 border-b border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-900 dark:text-white">
                                  {sub.name_ar}
                                </div>

                                {/* Items */}
                                {sub.items?.map(item => (
                                  <button
                                    key={item.id}
                                    onClick={() => onItemSelect(item)}
                                    className="w-full text-left p-3 border-b border-slate-200 dark:border-slate-700 hover:bg-blue-50 dark:hover:bg-blue-900/20 text-xs ml-16"
                                  >
                                    <p className="font-bold text-slate-900 dark:text-white">{item.title_ar}</p>
                                    <p className="text-slate-600 dark:text-slate-300">الكمية: {item.quantity} {item.unit}</p>
                                    <p className="text-blue-600 dark:text-blue-300 font-bold mt-1">
                                      💵 {(item.estimated_total || item.quantity * item.unit_price || 0).toLocaleString()} ريال
                                    </p>
                                  </button>
                                ))}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [darkMode, setDarkMode] = useState(localStorage.getItem('darkMode') === 'true');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [projects, setProjects] = useState([]);
      const [selectedProject, setSelectedProject] = useState(null);
      const [budget, setBudget] = useState({ estimated: 0, revised: 0, actual: 0 });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedItem, setSelectedItem] = useState(null);

      useEffect(() => {
        loadProjects();
      }, []);

      useEffect(() => {
        localStorage.setItem('darkMode', darkMode);
        document.documentElement.classList.toggle('dark', darkMode);
      }, [darkMode]);

      const loadProjects = async () => {
        try {
          setLoading(true);
          const { data } = await supabase.from('projects').select('*');

          if (data && data.length > 0) {
            setProjects(data);
            setSelectedProject(data[0].id);
            setError(null);
          } else {
            setError('لا توجد مشاريع');
          }
        } catch (e) {
          setError('❌ ' + e.message);
        } finally {
          setLoading(false);
        }
      };

      const calculateBudget = (phases) => {
        let totalEst = 0;
        phases.forEach(phase => {
          phase.packages?.forEach(pkg => {
            pkg.subcategories?.forEach(sub => {
              sub.items?.forEach(item => {
                totalEst += item.estimated_total || (item.quantity * item.unit_price) || 0;
              });
            });
          });
        });
        return { estimated: totalEst, revised: totalEst, actual: 0 };
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-slate-50 dark:bg-slate-900">
            <div className="text-center">
              <div className="text-5xl mb-4 animate-spin">⚙️</div>
              <p className="text-slate-600 dark:text-slate-300">جاري التحميل...</p>
            </div>
          </div>
        );
      }

      return (
        <div className={darkMode ? 'dark' : ''}>
          <div className="min-h-screen bg-slate-50 dark:bg-slate-900">
            {/* Header */}
            <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40 p-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setSidebarOpen(!sidebarOpen)}
                    className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-900 dark:text-white"
                  >
                    <Menu />
                  </button>
                  <Building2 />
                  <h1 className="text-xl font-bold text-slate-900 dark:text-white">منصة إدارة الفلل</h1>
                </div>
                <button
                  onClick={() => setDarkMode(!darkMode)}
                  className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-2xl"
                >
                  {darkMode ? <Sun /> : <Moon />}
                </button>
              </div>
            </header>

            {/* Content */}
            <div className="flex">
              {/* Sidebar */}
              {sidebarOpen && (
                <aside className="w-80 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 p-4 max-h-[calc(100vh-70px)] overflow-y-auto">
                  <h2 className="text-lg font-bold mb-4 text-slate-900 dark:text-white">📋 المشاريع</h2>

                  {error && (
                    <div className="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 p-3 rounded mb-4 text-sm text-red-600 dark:text-red-300">
                      {error}
                    </div>
                  )}

                  <div className="space-y-2">
                    {projects.map(project => (
                      <button
                        key={project.id}
                        onClick={() => setSelectedProject(project.id)}
                        className={`w-full text-left p-3 rounded-lg border transition ${
                          selectedProject === project.id
                            ? 'bg-blue-100 dark:bg-blue-900/40 border-blue-400 dark:border-blue-600'
                            : 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 hover:bg-blue-100 dark:hover:bg-blue-900/30'
                        }`}
                      >
                        <p className="font-bold text-slate-900 dark:text-white">{project.name}</p>
                        <p className="text-xs text-slate-600 dark:text-slate-300">{project.location_city}</p>
                      </button>
                    ))}
                  </div>
                </aside>
              )}

              {/* Main */}
              <main className="flex-1 p-4 max-h-[calc(100vh-70px)] overflow-y-auto">
                {selectedProject ? (
                  <div className="space-y-4 max-w-6xl">
                    {/* Project Tree */}
                    <ProjectTree
                      projectId={selectedProject}
                      onBudgetUpdate={(phases) => setBudget(calculateBudget(phases))}
                      onItemSelect={setSelectedItem}
                    />

                    {/* Budget */}
                    <div className="bg-white dark:bg-slate-800 rounded-lg shadow-lg p-5">
                      <h2 className="text-lg font-bold mb-4 text-slate-900 dark:text-white">💰 الميزانية</h2>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded border border-blue-200 dark:border-blue-800">
                          <p className="text-blue-600 dark:text-blue-300 text-xs font-bold">المقدرة</p>
                          <p className="font-bold text-lg text-slate-900 dark:text-white">{budget.estimated.toLocaleString()}</p>
                        </div>
                        <div className="bg-yellow-50 dark:bg-yellow-900/20 p-4 rounded border border-yellow-200 dark:border-yellow-800">
                          <p className="text-yellow-600 dark:text-yellow-300 text-xs font-bold">المعدلة</p>
                          <p className="font-bold text-lg text-slate-900 dark:text-white">{budget.revised.toLocaleString()}</p>
                        </div>
                        <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded border border-green-200 dark:border-green-800">
                          <p className="text-green-600 dark:text-green-300 text-xs font-bold">المنصرف</p>
                          <p className="font-bold text-lg text-slate-900 dark:text-white">{budget.actual.toLocaleString()}</p>
                        </div>
                      </div>
                    </div>

                    {/* Details */}
                    {selectedItem && (
                      <div className="bg-white dark:bg-slate-800 rounded-lg shadow-lg p-5">
                        <h2 className="font-bold mb-4 text-slate-900 dark:text-white">📝 التفاصيل</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm text-slate-900 dark:text-white">
                          <div><strong className="text-slate-600 dark:text-slate-300">الاسم:</strong> {selectedItem.title_ar}</div>
                          <div><strong className="text-slate-600 dark:text-slate-300">الكمية:</strong> {selectedItem.quantity} {selectedItem.unit}</div>
                          <div><strong className="text-slate-600 dark:text-slate-300">السعر:</strong> {selectedItem.unit_price?.toLocaleString() || 0} ريال</div>
                          <div><strong className="text-slate-600 dark:text-slate-300">الإجمالي:</strong> {(selectedItem.estimated_total || selectedItem.quantity * selectedItem.unit_price).toLocaleString()} ريال</div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="text-center py-20">
                    <p className="text-slate-600 dark:text-slate-300 text-lg">📊 لا توجد بيانات</p>
                  </div>
                )}
              </main>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
